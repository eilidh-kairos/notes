<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Notes</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        textarea {
            width: 100%;
            height: 100%;
            border: none;
            padding: 15px;
            box-sizing: border-box;
            font-size: 16px;
            resize: none;
            outline: none;
            background-color: #f9f9f9;
            color: #333;
        }
    </style>
</head>
<body>

    <textarea id="noteArea" placeholder="Type your offline notes here..."></textarea>

    <script>
        const noteArea = document.getElementById('noteArea');

        // 1. Load existing note from the browser's local storage immediately
        window.addEventListener('DOMContentLoaded', () => {
            const savedNote = localStorage.getItem('jotform_offline_note');
            if (savedNote) {
                noteArea.value = savedNote;
            }
        });

        // 2. Save text to local storage automatically as the user types
        noteArea.addEventListener('input', () => {
            localStorage.setItem('jotform_offline_note', noteArea.value);
        });
    </script>
</body>
</html>
